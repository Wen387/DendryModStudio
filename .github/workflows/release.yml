name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create or update a GitHub Release from this run"
        type: boolean
        default: false
      release_tag:
        description: "Release tag to create/use, for example v0.9.65-preview.1"
        type: string
        required: false
      prerelease:
        description: "Mark the GitHub Release as a pre-release"
        type: boolean
        default: true
      draft:
        description: "Create the GitHub Release as a draft"
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            tools/project_map/desktop/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Run checks
        run: npm run check:ci

  build:
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            script: dist:linux
            artifact_name: DendryModStudio-linux
            artifact_path: |
              tools/project_map/desktop/dist-builder/*.AppImage
              tools/project_map/desktop/dist-builder/*.deb
          - os: windows-latest
            script: dist:win
            artifact_name: DendryModStudio-windows
            artifact_path: tools/project_map/desktop/dist-builder/*.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            tools/project_map/desktop/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install desktop dependencies
        run: npm ci
        working-directory: tools/project_map/desktop

      - name: Fetch bundled Python runtime
        run: npm run fetch:python
        working-directory: tools/project_map/desktop

      - name: Run desktop smoke
        run: npm run smoke
        working-directory: tools/project_map/desktop

      - name: Build desktop artifact
        run: npm run ${{ matrix.script }}
        working-directory: tools/project_map/desktop

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || inputs.publish_release == true
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ inputs.release_tag }}"
            if [[ -z "${tag}" ]]; then
              echo "::error::release_tag is required when publish_release is enabled."
              exit 1
            fi
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release artifacts
        run: find release-artifacts -maxdepth 2 -type f -print

      - name: Upload GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Dendry Mod Studio ${{ steps.release.outputs.tag }}
          body: |
            Dendry Mod Studio desktop preview build.

            Assets:
            - Windows NSIS installer
            - Linux AppImage
            - Linux Deb

            These builds are unsigned and include the Python runtime used by the desktop indexer.
          prerelease: ${{ github.event_name != 'workflow_dispatch' || inputs.prerelease }}
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft }}
          files: release-artifacts/*
