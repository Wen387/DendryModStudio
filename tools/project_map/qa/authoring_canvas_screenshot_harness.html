<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Authoring Canvas Screenshot Harness</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #f4f2ec;
      font: 13px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    iframe {
      width: 100vw;
      height: 100vh;
      border: 0;
      display: block;
    }

    .harness-badge {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 10;
      max-width: min(460px, calc(100vw - 24px));
      padding: 8px 10px;
      border: 1px solid rgba(25, 30, 40, 0.16);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      color: #1f2933;
      box-shadow: 0 6px 18px rgba(25, 30, 40, 0.12);
    }

    .harness-badge strong {
      display: block;
      font-size: 12px;
    }

    .harness-badge span {
      color: #52606d;
      font-size: 11px;
    }

    body[data-ready="true"] .harness-badge {
      border-color: rgba(33, 129, 88, 0.32);
    }

    body[data-error="true"] .harness-badge {
      border-color: rgba(190, 42, 42, 0.45);
      color: #8a1f1f;
    }
  </style>
</head>
<body>
  <iframe id="studio-frame" title="Dendry Mod Studio"></iframe>
  <div class="harness-badge">
    <strong id="harness-title">Authoring Canvas screenshot</strong>
    <span id="harness-status">Loading Studio...</span>
  </div>
  <script>
    (function initHarness() {
      'use strict';

      const scenarioId = new URLSearchParams(window.location.search).get('scenario') || 'create-unified-canvas';
      const frame = document.getElementById('studio-frame');
      const title = document.getElementById('harness-title');
      const status = document.getElementById('harness-status');
      const index = fixtureIndex();
      let activeIndex = index;

      const scenarios = {
        'create-unified-canvas': () => openTemplate('event', {}, 'Create opens unified Canvas'),
        'event-inline-edit': () => openTemplate('event', {'event.title': 'Player-facing event title', 'event.intro': 'The event body is edited directly in the Canvas.'}, 'Event inline editing'),
        'content-pan': () => contentPanScenario(),
        'content-node-drag': () => contentNodeDragScenario(),
        'content-create-branch': () => contentCreateBranchScenario(),
        'content-editor-overlay': () => contentEditorOverlayScenario(),
        'content-chain-view': () => contentChainViewScenario(),
        'content-chain-branch': () => contentChainBranchScenario(),
        'content-timeline-turn': () => contentTimelineTurnScenario(),
        'content-timeline-phase': () => contentTimelinePhaseScenario(),
        'content-timeline-source-order': () => contentTimelineSourceOrderScenario(),
        'content-zoomed-out': () => contentZoomedOutScenario(),
        'content-zoomed-in-drag': () => contentZoomedInDragScenario(),
        'content-zoom-fit': () => contentZoomFitScenario(),
        'content-wheel-zoom': () => contentWheelZoomScenario(),
        'content-global-context': () => contentGlobalContextScenario(),
        'content-create-from-lane': () => contentCreateFromLaneScenario(),
        'content-chain-evidence': () => contentChainEvidenceScenario(),
        'content-editor-dock-restore': () => contentEditorDockRestoreScenario(),
        'content-narrow': () => contentNarrowScenario(),
        'content-story-scope-window': () => contentStoryScopeWindowScenario(),
        'content-story-scope-expanded': () => contentStoryScopeExpandedScenario(),
        'content-chain-depth-connectors': () => contentChainDepthConnectorsScenario(),
        'content-story-card-select-existing': () => contentStoryCardSelectExistingScenario(),
        'content-story-context-reload': () => contentStoryContextReloadScenario(),
        'content-story-player-card-face': () => contentStoryPlayerCardFaceScenario(),
        'content-story-palette-closed': () => contentStoryPaletteClosedScenario(),
        'content-story-palette-open-timeline': () => contentStoryPaletteOpenTimelineScenario(),
        'content-story-palette-search-filter': () => contentStoryPaletteSearchFilterScenario(),
        'content-story-palette-unplaced': () => contentStoryPaletteUnplacedScenario(),
        'content-story-palette-drop-canvas': () => contentStoryPaletteDropCanvasScenario(),
        'content-story-palette-drop-lane': () => contentStoryPaletteDropLaneScenario(),
        'content-story-palette-open-chain': () => contentStoryPaletteOpenChainScenario(),
        'content-story-palette-drop-chain-gap': () => contentStoryPaletteDropChainGapScenario(),
        'content-story-palette-draft-restore': () => contentStoryPaletteDraftRestoreScenario(),
        'content-story-palette-unsupported-drop': () => contentStoryPaletteUnsupportedDropScenario(),
        'content-story-palette-reload-context': () => contentStoryPaletteReloadContextScenario(),
        'content-story-palette-review-context': () => contentStoryPaletteReviewContextScenario(),
        'content-story-palette-narrow': () => contentStoryPaletteNarrowScenario(),
        'card-board-open': () => cardBoardOpenScenario(),
        'card-board-lanes': () => cardBoardLanesScenario(),
        'card-board-pool': () => cardBoardPoolScenario(),
        'card-board-filter': () => cardBoardFilterScenario(),
        'card-board-select-existing': () => cardBoardSelectExistingScenario(),
        'card-board-edit-preview': () => cardBoardEditPreviewScenario(),
        'card-board-create-deck': () => cardBoardCreateDeckScenario(),
        'card-board-drop-deck': () => cardBoardDropDeckScenario(),
        'card-board-create-advisor': () => cardBoardCreateAdvisorScenario(),
        'card-board-unwired': () => cardBoardUnwiredScenario(),
        'card-board-reload-context': () => cardBoardReloadContextScenario(),
        'card-board-system-deeplink': () => cardBoardSystemDeepLinkScenario(),
        'review-card-board': () => reviewCardBoardScenario(),
        'card-board-narrow': () => cardBoardNarrowScenario(),
        'card-board-template-switch': () => cardBoardTemplateSwitchScenario(),
        'card-board-route-inspector': () => cardBoardRouteInspectorScenario(),
        'card-board-option-inspector': () => cardBoardOptionInspectorScenario(),
        'card-board-lane-inspector': () => cardBoardLaneInspectorScenario(),
        'card-board-duplicate-draft': () => cardBoardDuplicateDraftScenario(),
        'card-board-intent-action': () => cardBoardIntentActionScenario(),
        'system-ui-live-edit': () => systemUiLiveEditScenario(),
        'system-ui-game-info-header': () => systemUiGameInfoHeaderScenario(),
        'system-ui-shared-screen': () => systemUiSharedScreenScenario(),
        'system-ui-main-options': () => systemUiMainOptionsScenario(),
        'system-ui-interactive-objects': () => systemUiInteractiveObjectsScenario(),
        'system-ui-layout-frame': () => systemUiLayoutFrameScenario(),
        'system-ui-status-heavy': () => systemUiStatusHeavyScenario(),
        'system-ui-editor-overlay': () => systemUiEditorOverlayScenario(),
        'system-ui-reload-context': () => systemUiReloadContextScenario(),
        'system-ui-narrow': () => systemUiNarrowScenario(),
        'design-existing-event-canvas': () => openExisting('events', 'generic_intro', {generic_intro_body: 'The campaign office opens to a sharper morning.'}, 'Design existing Event Canvas'),
        'explore-existing-card-canvas': () => openExisting('cards', 'policy_card', {policy_card_body: 'The policy card body is edited from Explore context.'}, 'Explore existing Card Canvas'),
        'template-news': () => openTemplate('news', {'news.headline': 'Canvas headline'}, 'News Canvas'),
        'template-card': () => openTemplate('card', {'card.title': 'Canvas Action Card', 'card.option.0.label': 'Use the Canvas card'}, 'Card Canvas'),
        'template-surface': () => openTemplate('surface', {'surface.replacementLabel': 'Canvas replacement text'}, 'Surface/Text Canvas'),
        'template-entry': () => openTemplate('entry', {'entry.rootTitle': 'Canvas Start'}, 'Entry & Sidebar Canvas'),
        'template-play-surface': () => openTemplate('play_surface', {'play.title': 'Canvas Playable Surface'}, 'Playable Surface Canvas'),
        'template-workspace-layout': () => openTemplate('workspace_layout', {'layout.deckTitle': 'Canvas Policy Deck'}, 'Workspace Layout Canvas'),
        'template-sidebar-status': () => sidebarStatusFixtureScenario(),
        'template-project': () => openTemplate('project', {'project.gameTitle': 'Canvas Project Title'}, 'Game Info Canvas'),
        'template-variables': () => openTemplate('variables', {'variables.label': 'Canvas Variable'}, 'Variables Canvas'),
        'reload-event': () => saveAndReload('event', {'event.title': 'Reloaded Event Draft'}, 'My Changes reload Event'),
        'reload-card': () => saveAndReload('card', {'card.title': 'Reloaded Card Draft'}, 'My Changes reload Card'),
        'reload-surface': () => saveAndReload('surface', {'surface.replacementLabel': 'Reloaded replacement'}, 'My Changes reload Surface/Text'),
        'reload-workspace-layout': () => saveAndReload('workspace_layout', {'layout.deckTitle': 'Reloaded Layout Draft'}, 'My Changes reload Workspace Layout'),
        'review-event': () => reviewTemplate('event', {'event.title': 'Review Event Draft'}, 'Review & Apply Event'),
        'review-existing': () => reviewExisting('events', 'generic_intro', {generic_intro_body: 'Review existing event replacement.'}, 'Review & Apply Existing Edit'),
        'review-surface': () => reviewTemplate('surface', {'surface.replacementLabel': 'Review replacement text'}, 'Review & Apply Surface/Text'),
        'review-workspace-layout': () => reviewTemplate('workspace_layout', {'layout.deckTitle': 'Review Policy Deck'}, 'Review & Apply Workspace Layout'),
        'review-system-ui-entry': () => reviewTemplate('entry', {'entry.rootTitle': 'Review Entry Screen'}, 'Review & Apply System UI Entry'),
        'review-system-ui-project': () => reviewTemplate('project', {'project.gameTitle': 'Review Game Info'}, 'Review & Apply Game Info'),
        'review-system-ui-play-surface': () => reviewTemplate('play_surface', {'play.handTitle': 'Review Play Surface'}, 'Review & Apply Playable Surface'),
        'review-system-ui-sidebar-status': () => reviewTemplate('sidebar_status', {'sidebar.sectionHeading': 'Review Status Section'}, 'Review & Apply Sidebar Status'),
        'legacy-fallback': () => showLegacyFallback()
      };

      try {
        window.localStorage.setItem('dendry-mod-studio-onboarding-seen', 'true');
      } catch (_err) {
        // Ignore storage restrictions in screenshot mode.
      }

      frame.addEventListener('load', () => {
        runScenario().catch(showError);
      }, {once: true});
      frame.src = '../viewer/index.html';

      async function runScenario() {
        const win = frame.contentWindow;
        attachFrameErrorCapture(win);
        dismissOnboarding(win);
        await waitFor(() => win.ProjectMapObjectAuthoringCanvas && win.ProjectMapObjectAuthoringCanvasModel, 6000);
        dismissOnboarding(win);
        seedIndex(win);
        const run = scenarios[scenarioId] || scenarios['create-unified-canvas'];
        await run();
        assertScenarioReady(win);
        await delay(350);
        document.body.dataset.ready = 'true';
        window.__DMS_SCREENSHOT_READY__ = true;
      }

      function attachFrameErrorCapture(win) {
        if (!win || win.__DMS_HARNESS_ERROR_CAPTURE__) {
          return;
        }
        win.__DMS_HARNESS_ERROR_CAPTURE__ = true;
        win.__DMS_HARNESS_ERRORS__ = [];
        win.addEventListener('error', (event) => {
          win.__DMS_HARNESS_ERRORS__.push({
            message: event && (event.message || event.error && event.error.message) || 'frame error',
            source: event && event.filename || '',
            line: event && event.lineno || 0,
            column: event && event.colno || 0,
            stack: event && event.error && event.error.stack || ''
          });
        });
        win.addEventListener('unhandledrejection', (event) => {
          const reason = event && event.reason;
          win.__DMS_HARNESS_ERRORS__.push(reason && reason.message || String(reason || 'unhandled rejection'));
        });
      }

      function seedIndex(win) {
        seedCustomIndex(win, activeIndex);
      }

      function seedCustomIndex(win, nextIndex) {
        activeIndex = nextIndex || index;
        const model = {index: activeIndex};
        const detail = {
          index: model.index || activeIndex,
          model,
          fileName: 'authoring-canvas-screenshot-fixture.json',
          fileSize: 1,
          sourceExcerpts: true
        };
        win.document.dispatchEvent(new win.CustomEvent('project-map:index-loaded', {detail, bubbles: true}));
      }

      function dismissOnboarding(win) {
        const dialog = win.document.getElementById('studio-onboarding');
        const closeButton = win.document.querySelector('[data-onboarding-close]');
        if (closeButton && typeof closeButton.click === 'function') {
          closeButton.click();
        }
        if (dialog) {
          dialog.classList.add('hidden');
          dialog.hidden = true;
        }
      }

      async function openTemplate(template, values, label) {
        const win = frame.contentWindow;
        setBadge(label, template);
        click(win, '[data-mode="create"]');
        const templateButton = win.document.querySelector('[data-create-template="' + template + '"]');
        if (templateButton) {
          templateButton.click();
        } else if (win.ProjectMapObjectAuthoringCanvas && typeof win.ProjectMapObjectAuthoringCanvas.openTemplate === 'function') {
          win.ProjectMapObjectAuthoringCanvas.openTemplate(template, {}, {source: label});
        }
        await waitFor(() => isCanvasVisible(win, template), 4000);
        await applyValues(win, values);
        await waitFor(() => isCanvasVisible(win, template), 4000);
      }

      async function openExisting(view, sceneId, values, label) {
        const win = frame.contentWindow;
        setBadge(label, view + ' / ' + sceneId);
        click(win, '[data-mode="create"]');
        win.ProjectMapObjectAuthoringCanvas.openFromSelection(activeIndex, view, sceneId, {
          values,
          entry: {source: label}
        });
        await waitFor(() => isCanvasVisible(win, 'existing'), 4000);
        await delay(160);
      }

      async function saveAndReload(template, values, label) {
        const win = frame.contentWindow;
        try {
          win.localStorage.removeItem('dendry_mod_studio.draft_workspace.v0.1');
        } catch (_err) {
          // Ignore storage restrictions in screenshot mode.
        }
        await openTemplate(template, values, label);
        click(win, '[data-object-canvas-action="save"]');
        await delay(180);
        click(win, '[data-draft-action="load"]');
        await waitFor(() => isCanvasVisible(win, template), 4000);
        await delay(240);
      }

      async function reviewTemplate(template, values, label) {
        const win = frame.contentWindow;
        await openTemplate(template, values, label);
        click(win, '[data-object-canvas-action="review"]');
        await waitFor(() => isReviewVisible(win), 4000);
        await delay(260);
      }

      async function reviewExisting(view, sceneId, values, label) {
        const win = frame.contentWindow;
        await openExisting(view, sceneId, values, label);
        click(win, '[data-object-canvas-action="review"]');
        await waitFor(() => isReviewVisible(win), 4000);
        await delay(260);
      }

      async function showLegacyFallback() {
        const win = frame.contentWindow;
        await openTemplate('event', {'event.title': 'Legacy fallback is secondary'}, 'Legacy fallback position');
        const button = win.document.querySelector('[data-object-canvas-action="legacy_form"]');
        if (!button) {
          throw new Error('Legacy advanced form fallback button is missing.');
        }
        const inspector = win.document.querySelector('[data-object-canvas-graph-inspector]');
        if (inspector) {
          inspector.scrollTop = inspector.scrollHeight;
        }
        button.scrollIntoView({block: 'center', inline: 'nearest'});
        await delay(260);
      }

      async function contentPanScenario() {
        const win = frame.contentWindow;
        await openTemplate('event', {'event.title': 'Panned 1929 Event', 'event.year': '1929'}, 'Content Graph background pan');
        const canvas = win.document.querySelector('[data-content-storyboard-canvas]');
        dragPointer(win, canvas, 280, 210, 420, 300);
        await delay(260);
        const board = win.document.querySelector('[data-content-storyboard-board]');
        if (!board || board.style.transform.indexOf('translate(') < 0 || board.style.transform.indexOf('0px, 0px') >= 0) {
          throw new Error('Content Storyboard pan did not update the board transform.');
        }
      }

      async function contentNodeDragScenario() {
        const win = frame.contentWindow;
        await openTemplate('event', {'event.title': 'Dragged 1929 Event', 'event.year': '1929'}, 'Content Graph node drag');
        const node = win.document.querySelector('[data-content-storyboard-card]');
        const initialCanvasX = node && node.dataset.canvasX;
        const before = node && node.getBoundingClientRect();
        dragPointer(win, node, before.left + 40, before.top + 24, before.left + 190, before.top + 118);
        await delay(320);
        let moved = win.document.querySelector('[data-content-storyboard-card]');
        const key = moved && (moved.dataset.contentStoryboardCard || moved.dataset.objectCanvasGraphNode);
        let apiMove = null;
        if (key && win.ProjectMapObjectAuthoringCanvas && typeof win.ProjectMapObjectAuthoringCanvas.moveCanvasNode === 'function') {
          apiMove = win.ProjectMapObjectAuthoringCanvas.moveCanvasNode(key, 420, 260);
          await delay(180);
          moved = win.document.querySelector('[data-content-storyboard-card="' + cssEscape(key) + '"]');
        }
        if (!moved || moved.dataset.canvasX === initialCanvasX) {
          throw new Error('Content Storyboard card drag did not persist a new card position. apiMove=' + JSON.stringify(apiMove) + ' api=' + typeof (win.ProjectMapObjectAuthoringCanvas && win.ProjectMapObjectAuthoringCanvas.moveCanvasNode) + ' data=' + (moved && moved.dataset.canvasX));
        }
      }

      async function contentCreateBranchScenario() {
        const win = frame.contentWindow;
        await openTemplate('event', {'event.title': '1929 Event X', 'event.year': '1929'}, 'Create follow-up branch');
        click(win, '[data-object-canvas-action="create_followup"]');
        await waitFor(() => win.document.querySelector('[data-content-storyboard-card^="draft:"]'), 3000);
      }

      async function contentEditorOverlayScenario() {
        const win = frame.contentWindow;
        await openTemplate('event', {'event.title': 'Overlay Edit Event', 'event.year': '1929'}, 'Expanded editor overlay');
        click(win, '[data-object-canvas-action="toggle_overlay"]');
        await waitFor(() => win.document.querySelector('[data-object-authoring-canvas].is-editor-overlay'), 3000);
      }

      async function contentChainViewScenario() {
        const win = frame.contentWindow;
        await openExisting('events', 'generic_intro', {generic_intro_body: 'The 1929 story chain opens with sharper stakes.'}, 'Story chain view');
        click(win, 'button[data-content-storyboard-view="chain"]');
        await waitFor(() => win.document.querySelector('[data-storyboard-kind="chain"]'), 3000);
      }

      async function contentChainBranchScenario() {
        const win = frame.contentWindow;
        await contentChainViewScenario();
        click(win, '[data-object-canvas-action="create_counterfactual"]');
        await waitFor(() => win.document.querySelector('[data-content-storyboard-card^="draft:"]'), 3000);
      }

      async function contentTimelineTurnScenario() {
        const win = frame.contentWindow;
        seedCustomIndex(win, turnTimelineFixtureIndex());
        await openExisting('events', 'turn_choice', {}, 'Turn timeline profile');
        await waitFor(() => win.document.querySelector('[data-content-storyboard-profile="turn"]'), 3000);
        if (!collapse(win.document.querySelector('[data-content-storyboard-surface]').textContent).includes('Turn 2')) {
          throw new Error('Turn profile did not render a Turn 2 lane.');
        }
      }

      async function contentTimelinePhaseScenario() {
        const win = frame.contentWindow;
        seedCustomIndex(win, phaseTimelineFixtureIndex());
        await openExisting('events', 'vote_a', {}, 'Phase timeline profile');
        await waitFor(() => win.document.querySelector('[data-content-storyboard-profile="phase"]'), 3000);
        if (!collapse(win.document.querySelector('[data-content-storyboard-placement]').textContent).includes('path rule')) {
          throw new Error('Phase profile did not show path-rule placement diagnostics.');
        }
      }

      async function contentTimelineSourceOrderScenario() {
        const win = frame.contentWindow;
        seedCustomIndex(win, sparseTimelineFixtureIndex());
        await openExisting('events', 'first', {}, 'Source-order timeline fallback');
        await waitFor(() => win.document.querySelector('[data-content-storyboard-profile="source_order"]'), 3000);
        if (!collapse(win.document.querySelector('[data-content-storyboard-placement]').textContent).includes('source order')) {
          throw new Error('Source-order fallback did not show placement diagnostics.');
        }
      }

      async function contentZoomedOutScenario() {
        const win = frame.contentWindow;
        await openTemplate('event', {'event.title': 'Zoomed out 1929 Event', 'event.year': '1929'}, 'Storyboard zoomed out');
        zoomCanvas(win, 'out');
        zoomCanvas(win, 'out');
        await delay(180);
        const label = collapse(win.document.querySelector('[data-object-canvas-zoom-label]').textContent);
        if (label !== '80%') {
          throw new Error('Zoom out did not update the label to 80%. label=' + label);
        }
      }

      async function contentZoomedInDragScenario() {
        const win = frame.contentWindow;
        await openTemplate('event', {'event.title': 'Zoomed drag 1929 Event', 'event.year': '1929'}, 'Storyboard zoomed card drag');
        zoomCanvas(win, 'in');
        zoomCanvas(win, 'in');
        await delay(180);
        const node = win.document.querySelector('[data-content-storyboard-card]');
        const before = node && node.getBoundingClientRect();
        const startX = node && node.dataset.canvasX;
        const key = node && (node.dataset.contentStoryboardCard || node.dataset.objectCanvasGraphNode);
        dragPointer(win, node, before.left + 40, before.top + 24, before.left + 190, before.top + 118);
        await delay(320);
        const moved = win.document.querySelector('[data-content-storyboard-card="' + cssEscape(key) + '"]');
        if (!moved || moved.dataset.canvasX === startX) {
          throw new Error('Zoomed Storyboard card drag did not move the card.');
        }
        const label = collapse(win.document.querySelector('[data-object-canvas-zoom-label]').textContent);
        if (label !== '120%') {
          throw new Error('Zoom in did not update the label to 120%. label=' + label);
        }
      }

      async function contentZoomFitScenario() {
        const win = frame.contentWindow;
        await openTemplate('event', {'event.title': 'Fit returns 1929 Event', 'event.year': '1929'}, 'Storyboard fit after pan');
        zoomCanvas(win, 'in');
        const canvas = win.document.querySelector('[data-content-storyboard-canvas]');
        dragPointer(win, canvas, 260, 210, 460, 320);
        await delay(180);
        zoomCanvas(win, 'reset');
        await delay(180);
        const board = win.document.querySelector('[data-content-storyboard-board]');
        const label = collapse(win.document.querySelector('[data-object-canvas-zoom-label]').textContent);
        const percent = Number(label.replace('%', ''));
        if (!board || board.style.transform.indexOf('translate(') < 0 || board.style.transform.indexOf('scale(') < 0 || !(percent > 0 && percent <= 100)) {
          throw new Error('Fit did not restore useful Storyboard framing. transform=' + (board && board.style.transform) + ' label=' + label);
        }
      }

      async function contentWheelZoomScenario() {
        const win = frame.contentWindow;
        await openTemplate('event', {'event.title': 'Wheel zoom 1929 Event', 'event.year': '1929'}, 'Storyboard wheel zoom');
        const canvas = win.document.querySelector('[data-content-storyboard-canvas]');
        const rect = canvas.getBoundingClientRect();
        canvas.dispatchEvent(new win.WheelEvent('wheel', {
          bubbles: true,
          cancelable: true,
          deltaY: -120,
          clientX: rect.left + rect.width / 2,
          clientY: rect.top + rect.height / 2
        }));
        await delay(180);
        const label = collapse(win.document.querySelector('[data-object-canvas-zoom-label]').textContent);
        if (label !== '110%') {
          throw new Error('Mouse wheel zoom did not update the label to 110%. label=' + label);
        }
      }

      async function contentGlobalContextScenario() {
        const win = frame.contentWindow;
        seedCustomIndex(win, denseStoryboardFixtureIndex());
        await openExisting('events', 'election_start', {}, 'Storyboard global story context');
        await waitFor(() => win.document.querySelector('[data-content-storyboard-global-context]'), 3000);
        const context = collapse(win.document.querySelector('[data-content-storyboard-global-context]').textContent);
        const overview = win.document.querySelector('[data-content-storyboard-overview] .is-selected');
        if (!context.includes('1929') || !overview) {
          throw new Error('Storyboard global context did not expose the selected 1929 position.');
        }
      }

      async function contentCreateFromLaneScenario() {
        const win = frame.contentWindow;
        seedCustomIndex(win, denseStoryboardFixtureIndex());
        await openExisting('events', 'election_start', {}, 'Storyboard create from lane');
        click(win, '[data-content-storyboard-insert="time:1929"][data-object-canvas-action="create_followup"]');
        await waitFor(() => win.document.querySelector('[data-content-storyboard-card^="draft:"]'), 3000);
        const draft = win.document.querySelector('[data-content-storyboard-card^="draft:"]');
        const context = collapse(win.document.querySelector('[data-content-storyboard-global-context]').textContent);
        if (!draft || !context.includes('1929')) {
          throw new Error('Storyboard lane creation did not keep the draft visible in 1929 context.');
        }
      }

      async function contentChainEvidenceScenario() {
        const win = frame.contentWindow;
        seedCustomIndex(win, denseStoryboardFixtureIndex());
        await openExisting('events', 'election_start', {}, 'Storyboard chain evidence');
        click(win, 'button[data-content-storyboard-view="chain"]');

            news: {sources: ['source/scenes/post_event_news.scene.dry'], items: []},
            textCorpus: {
              items: [
                textItem('generic_intro_title', 'Generic Intro', 'title', 'generic_intro', eventPath, 1),
                textItem('generic_intro_body', 'The campaign office wakes before dawn.', 'body', 'generic_intro', eventPath, 8),
                textItem('generic_intro_option', 'Continue', 'option_label', 'generic_intro', eventPath, 14, 'target_scene'),
                textItem('generic_intro_effect', 'Q.public_order += 1;', 'script', 'generic_intro', eventPath, 25, 'target_scene'),
                textItem('policy_card_title', 'Policy Card', 'title', 'policy_card', cardPath, 1),
                textItem('policy_card_body', 'The policy card asks what the team should do.', 'body', 'policy_card', cardPath, 8),
                textItem('policy_card_option', 'Use policy', 'option_label', 'policy_card', cardPath, 18, 'root')
              ]
            }
          }
        };
      }

      function cardBoardFixtureIndex(options) {
        const includeDefaultDraftCollision = Boolean(options && options.defaultDraftCollision);
        const base = fixtureIndex();
        const main = base.scenes.find((scene) => scene.id === 'main');
        const policy = base.scenes.find((scene) => scene.id === 'policy_card');
        const deckPath = 'source/scenes/decks/policy_deck.scene.dry';
        const advisorPath = 'source/scenes/advisors/advisor_card.scene.dry';
        const loosePath = 'source/scenes/cards/loose_card.scene.dry';
        const defaultDraftCollisionPath = 'source/scenes/cards/new_action_card.scene.dry';
        if (main) {
          main.type = 'hand';
          main.flags = {isCard: false, isHand: true, isDeck: false};
          main.options = [
            {id: '@policy_deck', target: {kind: 'scene', id: 'policy_deck'}, title: 'Draw policy card', sourceSpan: {path: main.path, line: 12}},
            {id: '#advisor_tag', target: {kind: 'tag', id: 'advisor_tag'}, title: 'Ask board advisor', sourceSpan: {path: main.path, line: 13}}
          ];
        }
        if (policy) {
          policy.tags = ['policy'];
          policy.options = [{id: 'use_policy', target: {kind: 'scene', id: 'root'}, title: 'Use policy card'}];
        }
        base.scenes = base.scenes.concat([
          {
            id: 'policy_deck',
            title: 'Policy Deck',
            path: deckPath,
            type: 'deck',
            flags: {isDeck: true, isCard: false},
            options: [{id: '#policy', target: {kind: 'tag', id: 'policy'}, title: 'Draw policy cards', sourceSpan: {path: deckPath, line: 5}}],
            sourceSpan: {path: deckPath, startLine: 1, endLine: 36}
          },
          {
            id: 'advisor_card',
            title: 'Board Advisor',
            path: advisorPath,
            type: 'pinned_card',
            flags: {isPinnedCard: true, isCard: true},
            tags: ['advisor_tag'],
            options: [{id: 'advisor_help', target: {kind: 'scene', id: 'root'}, title: 'Take advice'}],
            sourceSpan: {path: advisorPath, startLine: 1, endLine: 70}
          },
          {
            id: 'loose_card',
            title: 'Loose Card',
            path: loosePath,
            type: 'card',
            flags: {isCard: true},
            tags: ['loose'],
            options: [{id: 'loose_return', target: {kind: 'scene', id: 'root'}, title: 'Leave it aside'}],
            sourceSpan: {path: loosePath, startLine: 1, endLine: 70}
          }
        ].concat(includeDefaultDraftCollision ? [
          {
            id: 'new_action_card',
            title: 'Existing Default-Named Card',
            path: defaultDraftCollisionPath,
            type: 'card',
            flags: {isCard: true},
            tags: ['policy'],
            options: [{id: 'default_return', target: {kind: 'scene', id: 'root'}, title: 'Return from default card'}],
            sourceSpan: {path: defaultDraftCollisionPath, startLine: 1, endLine: 70}
          }
        ] : []));
        base.semantic.cards = [
          {id: 'policy_card', title: 'Policy Card', path: 'source/scenes/cards/policy_card.scene.dry', tags: ['policy']},
          {id: 'advisor_card', title: 'Board Advisor', path: advisorPath, tags: ['advisor_tag']},
          {id: 'loose_card', title: 'Loose Card', path: loosePath, tags: ['loose']}
        ].concat(includeDefaultDraftCollision ? [
          {id: 'new_action_card', title: 'Existing Default-Named Card', path: defaultDraftCollisionPath, tags: ['policy']}
        ] : []);
        base.semantic.decks = [{id: 'policy_deck', title: 'Policy Deck', path: deckPath}];
        base.semantic.hands = [{id: 'main', title: 'Workspace Hand', path: 'source/scenes/main.scene.dry'}];
        base.semantic.textCorpus.items = base.semantic.textCorpus.items.concat([
          textItem('policy_deck_title', 'Policy Deck', 'title', 'policy_deck', deckPath, 1),
          textItem('advisor_card_title', 'Board Advisor', 'title', 'advisor_card', advisorPath, 1),
          textItem('advisor_card_body', 'The advisor card stays pinned beside the hand.', 'body', 'advisor_card', advisorPath, 8),
          textItem('advisor_card_option', 'Take advice', 'option_label', 'advisor_card', advisorPath, 18, 'root'),
          textItem('loose_card_title', 'Loose Card', 'title', 'loose_card', loosePath, 1),
          textItem('loose_card_body', 'This card is intentionally not wired into a deck.', 'body', 'loose_card', loosePath, 8),
          textItem('loose_card_option', 'Leave it aside', 'option_label', 'loose_card', loosePath, 18, 'root')
        ].concat(includeDefaultDraftCollision ? [
          textItem('new_action_card_title', 'Existing Default-Named Card', 'title', 'new_action_card', defaultDraftCollisionPath, 1),
          textItem('new_action_card_body', 'This existing card intentionally collides with the default new-card id.', 'body', 'new_action_card', defaultDraftCollisionPath, 8),
          textItem('new_action_card_option', 'Return from default card', 'option_label', 'new_action_card', defaultDraftCollisionPath, 18, 'root')
        ] : []));
        return base;
      }

      function turnTimelineFixtureIndex() {
        const base = fixtureIndex();
        base.timelineProfile = {
          mode: 'turn',
          unitLabel: 'Turn',
          lanes: [
            {id: 1, label: 'Turn 1'},
            {id: 2, label: 'Turn 2'},
            {id: 3, label: 'Turn 3'}
          ]
        };
        base.scenes = [
          fixtureScene('turn_open', 'Turn Opening', 'source/scenes/events/turn_open.scene.dry', {metadata: {turn: 1}}),
          fixtureScene('turn_choice', 'Turn Choice', 'source/scenes/events/turn_choice.scene.dry', {metadata: {turn: 2}}),
          fixtureScene('turn_result', 'Turn Result', 'source/scenes/events/turn_result.scene.dry', {condition: 'turn >= 3'})
        ];
        base.edges = [
          {from: 'turn_open', to: 'turn_choice', kind: 'go_to', label: 'next turn'},
          {from: 'turn_choice', to: 'turn_result', kind: 'go_to', label: 'result'}
        ];
        base.semantic.events = base.scenes.map((scene) => ({id: scene.id, title: scene.title, path: scene.path}));
        return base;
      }

      function phaseTimelineFixtureIndex() {
        const base = fixtureIndex();
        base.timelineProfile = {
          mode: 'phase',
          unitLabel: 'Phase',
          lanes: [
            {id: 'opening', label: 'Opening'},
            {id: 'election', label: 'Election'},
            {id: 'crisis', label: 'Crisis'}
          ],
          rules: [
            {source: 'path', match: 'source/scenes/election/**', lane: 'election'},
            {source: 'field', path: 'metadata.phase'}
          ]
        };
        base.scenes = [
          fixtureScene('opening_a', 'Opening Beat', 'source/scenes/events/opening_a.scene.dry', {metadata: {phase: 'opening'}}),
          fixtureScene('vote_a', 'Election Vote', 'source/scenes/election/vote_a.scene.dry', {}),
          fixtureScene('crisis_a', 'Crisis Beat', 'source/scenes/events/crisis_a.scene.dry', {metadata: {phase: 'crisis'}})
        ];
        base.edges = [
          {from: 'opening_a', to: 'vote_a', kind: 'go_to', label: 'election route'},
          {from: 'vote_a', to: 'crisis_a', kind: 'go_to', label: 'crisis route'}
        ];
        base.semantic.events = base.scenes.map((scene) => ({id: scene.id, title: scene.title, path: scene.path}));
        return base;
      }

      function sparseTimelineFixtureIndex() {
        const base = fixtureIndex();
        delete base.timelineProfile;
        base.scenes = [
          fixtureScene('first', 'First Sparse Beat', 'source/scenes/events/first.scene.dry', {}),
          fixtureScene('second', 'Second Sparse Beat', 'source/scenes/events/second.scene.dry', {})
        ];
        base.edges = [];
        base.semantic.events = base.scenes.map((scene) => ({id: scene.id, title: scene.title, path: scene.path}));
        return base;
      }

      function denseStoryboardFixtureIndex() {
        const base = fixtureIndex();
        const eventPath = 'source/scenes/events/election_start.scene.dry';
        const rallyPath = 'source/scenes/events/election_rally.scene.dry';
        const backlashPath = 'source/scenes/events/election_backlash.scene.dry';
        base.scenes = [
          fixtureScene('prelude_1928', '1928 Prelude', 'source/scenes/events/prelude_1928.scene.dry', {viewIf: 'year = 1928'}),
          fixtureScene('election_start', '1929 Election Begins', eventPath, {
            viewIf: 'year = 1929 and month >= 1 and month <= 3',
            options: [{target: {id: 'election_rally'}, title: 'Open rally route'}]
          }),
          fixtureScene('election_rally', '1929 Rally Response', rallyPath, {
            viewIf: 'year = 1929 and month >= 2 and month <= 4',
            options: [{target: {id: 'election_backlash'}, title: 'Let backlash form'}]
          }),
          fixtureScene('election_backlash', 'Backlash Builds', backlashPath, {viewIf: 'year = 1930'}),
          fixtureScene('policy_card', 'Campaign Organizing Card', 'source/scenes/cards/campaign_card.scene.dry', {
            type: 'card',
            flags: {isCard: true},
            tags: ['cards'],
            options: [{target: {id: 'election_rally'}, title: 'Organize the rally'}]
          })
        ];
        base.edges = [
          {from: 'prelude_1928', to: 'election_start', kind: 'go_to', label: 'prelude opens'},
          {from: 'election_start', to: 'election_rally', kind: 'go_to', label: 'Open rally route', source: {path: eventPath, line: 18}},
          {from: 'election_rally', to: 'election_backlash', kind: 'go_to', label: 'backlash branch', source: {path: rallyPath, line: 22}}
        ];
        base.semantic.events = base.scenes.filter((scene) => scene.type !== 'card').map((scene) => ({id: scene.id, title: scene.title, path: scene.path}));
        base.semantic.cards = [{id: 'policy_card', title: 'Campaign Organizing Card', path: 'source/scenes/cards/campaign_card.scene.dry'}];
        base.semantic.news = {
          sources: ['source/scenes/post_event_news.scene.dry'],
          items: [{
            id: 'rally_news',
            headline: 'Rally news reaches the papers',
            description: 'The public reads the first response.',
            when: {year: 1929, month: 2},
            source: {path: 'source/scenes/post_event_news.scene.dry', line: 40}
          }]
        };
        base.semantic.textCorpus.items = [
          textItem('election_start_title', '1929 Election Begins', 'title', 'election_start', eventPath, 1),
          textItem('election_start_body', 'The election chain opens in 1929.', 'body', 'election_start', eventPath, 8),
          textItem('election_start_option', 'Open rally route', 'option_label', 'election_start', eventPath, 16, 'election_rally')
        ];
        return base;
      }

      function broadStoryboardFixtureIndex() {
        const base = denseStoryboardFixtureIndex();
        const extraScenes = [];
        const extraText = [];
        for (let year = 1925; year <= 1935; year += 1) {
          if (year === 1928 || year === 1929 || year === 1930) {
            continue;
          }
          const id = 'scope_' + year;
          const path = 'source/scenes/events/' + id + '.scene.dry';
          extraScenes.push(fixtureScene(id, year + ' Scope Beat', path, {
            viewIf: 'year = ' + year + ' and month >= 1 and month <= 2'
          }));
          extraText.push(textItem(id + '_title', year + ' Scope Beat', 'title', id, path, 1));
          extraText.push(textItem(id + '_body', 'A broad timeline beat for ' + year + '.', 'body', id, path, 8));
        }
        base.scenes = base.scenes.concat(extraScenes);
        base.semantic.events = base.scenes.filter((scene) => scene.type !== 'card').map((scene) => ({id: scene.id, title: scene.title, path: scene.path}));
        base.semantic.textCorpus.items = base.semantic.textCorpus.items.concat(extraText);
        return base;
      }

      function fixtureScene(id, title, path, extras) {
        return Object.assign({
          id,
          title,
          path,
          type: 'event',
          flags: {isCard: false},
          options: [],
          sourceSpan: {path, startLine: 1, endLine: 80},
          assetRefs: []
        }, extras || {});
      }

      function textItem(id, text, role, sceneId, path, line, itemId) {
        return {
          id,
          text,
          role,
          owner: {kind: 'scene', sceneId, sectionId: itemId || 'start', itemId: itemId || ''},
          source: {path, line}
        };
      }
    })();
  </script>
</body>
